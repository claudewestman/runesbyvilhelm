    <script>
      // Restore path from GitHub Pages 404 redirect
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          })
          window.history.replaceState(null, null,
            decoded[0] + (decoded[1] ? '?' + decoded[1] : '') + l.hash
          )
        }
      }(window.location))
