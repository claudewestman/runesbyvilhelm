<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" fill="#0c0a08" rx="80"/>

  <!-- Fehu rune – vertical staff + two diagonal branches -->
  <g stroke="#c9a84c" stroke-width="52" stroke-linecap="round" fill="none">
    <!-- Vertical staff -->
    <line x1="175" y1="48" x2="175" y2="472"/>
    <!-- Upper branch (angled up-right) -->
    <line x1="175" y1="128" x2="415" y2="52"/>
    <!-- Lower branch (angled up-right, parallel) -->
    <line x1="175" y1="258" x2="415" y2="182"/>
  </g>
</svg>
